<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anuj Yadav</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #1F1B2E;
    --bg-2: #2A2440;
    --cream: #F5EFE6;
    --gold: #E8B84B;
    --coral: #FF6F59;
    --muted: #B6AFC9;
  }
  *{ box-sizing: border-box; }
  html,body{
    margin:0; padding:0;
    background: var(--bg);
    color: var(--cream);
    font-family: 'Inter', sans-serif;
    min-height:100vh;
    overflow-x:hidden;
  }
  body{
    background-image:
      radial-gradient(circle at 15% 20%, rgba(255,111,89,0.10), transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(232,184,75,0.10), transparent 40%);
  }
  .wrap{
    max-width: 640px;
    margin: 0 auto;
    padding: 72px 24px 56px;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
  }
  .avatar{
    width: 108px; height:108px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--coral), var(--gold));
    display:flex; align-items:center; justify-content:center;
    font-family:'Fraunces', serif;
    font-size: 42px;
    color: var(--bg);
    font-weight:600;
    margin-bottom: 22px;
    box-shadow: 0 12px 32px rgba(255,111,89,0.25);
  }
  h1{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size: clamp(32px, 6vw, 44px);
    margin: 0 0 6px;
    letter-spacing: -0.01em;
  }
  .handle{
    font-family:'JetBrains Mono', monospace;
    color: var(--gold);
    font-size: 14px;
    margin-bottom: 18px;
    letter-spacing: 0.02em;
  }
  .bio{
    font-size: 16px;
    line-height:1.6;
    color: var(--muted);
    max-width: 440px;
    margin: 0 0 44px;
  }
  .board{
    width:100%;
    display:flex;
    flex-direction:column;
    gap: 22px;
    margin-bottom: 40px;
  }
  .pin{
    position:relative;
    display:flex;
    align-items:center;
    gap:18px;
    background: var(--bg-2);
    border: 1px solid rgba(245,239,230,0.08);
    border-radius: 18px;
    padding: 20px 22px;
    text-decoration:none;
    color: var(--cream);
    transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
  }
  .pin:nth-child(1){ transform: rotate(-1.4deg); }
  .pin:nth-child(2){ transform: rotate(1.2deg); }
  .pin:hover{
    transform: translateY(-4px) rotate(0deg) scale(1.015);
    border-color: rgba(245,239,230,0.18);
  }
  .pin:focus-visible{
    outline: 2px solid var(--gold);
    outline-offset: 3px;
  }
  .pin .tape{
    position:absolute;
    top:-9px; left: 28px;
    width: 46px; height: 16px;
    background: rgba(245,239,230,0.16);
    border-radius: 2px;
    transform: rotate(-3deg);
  }
  .icon{
    flex-shrink:0;
    width: 48px; height:48px;
    border-radius: 12px;
    display:flex; align-items:center; justify-content:center;
    font-size: 22px;
  }
  .pin.ig .icon{ background: linear-gradient(135deg,#feda75,#fa7e1e,#d62976,#962fbf); }
  .pin.pin-it .icon{ background: var(--coral); }
  .pin-text{ text-align:left; flex:1; }
  .pin-text .label{
    font-weight:600;
    font-size: 16px;
    margin-bottom: 2px;
  }
  .pin-text .sub{
    font-family:'JetBrains Mono', monospace;
    font-size: 12.5px;
    color: var(--muted);
  }
  .arrow{ color: var(--muted); font-size: 18px; flex-shrink:0; }
  footer{
    font-size: 12px;
    color: var(--muted);
    opacity: 0.6;
    font-family:'JetBrains Mono', monospace;
  }
  @media (prefers-reduced-motion: reduce){
    .pin{ transition:none; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="avatar">AY</div>
    <h1>Anuj Yadav</h1>
    <div class="handle">@anuj._.yadav966</div>
    <p class="bio">Sharing what I build and what I find worth saving. Come follow along.</p>

    <div class="board">
      <a class="pin ig" href="https://www.instagram.com/anuj._.yadav966?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw==" target="_blank" rel="noopener">
        <span class="tape"></span>
        <span class="icon">📷</span>
        <span class="pin-text">
          <div class="label">Instagram</div>
          <div class="sub">@anuj._.yadav966</div>
        </span>
        <span class="arrow">→</span>
      </a>

      <a class="pin pin-it" href="https://pin.it/2RmrjdQl6" target="_blank" rel="noopener">
        <span class="tape"></span>
        <span class="icon">📌</span>
        <span class="pin-text">
          <div class="label">Pinterest</div>
          <div class="sub">my boards</div>
        </span>
        <span class="arrow">→</span>
      </a>
    </div>

    <footer>made with care · updated 2026</footer>
  </div>
</body>
</html>
